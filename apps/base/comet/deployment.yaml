apiVersion: apps/v1
kind: Deployment
metadata:
  name: comet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comet
  template:
    metadata:
      labels:
        app: comet
    spec:
      containers:
        - name: comet
          image: ghcr.io/g0ldyy/comet:latest
          ports:
            - containerPort: 8000
              protocol: TCP

          env:
            - name: COMET_FASTAPI_HOST
              value: "0.0.0.0"
            - name: COMET_FASTAPI_PORT
              value: "8000"

          securityContext:
            allowPrivilegeEscalation: false

      restartPolicy: Always
