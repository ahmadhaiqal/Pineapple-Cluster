apiVersion: apps/v1
kind: Deployment
metadata:
  name: comet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comet
  template:
    metadata:
      labels:
        app: comet
    spec:
      containers:
        - name: comet
          image: ghcr.io/g0ldyy/comet:v2.54.1
          ports:
            - containerPort: 8000
              protocol: TCP

          env:
            - name: COMET_FASTAPI_HOST
              value: "0.0.0.0"
            - name: COMET_FASTAPI_PORT
              value: "8000"
            - name: COMET_INDEXER_MANAGER
              value: "prowlarr"
            - name: COMET_INDEXER_MANAGER_URL
              value: "http://prowlarr.prowlarr.svc.cluster.local:9696"
            - name: COMET_INDEXER_MANAGER_INDEXERS
              value: '["*"]'
            - name: COMET_INDEXER_MANAGER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: comet-prowlarr
                  key: api_key

          securityContext:
            allowPrivilegeEscalation: false

      restartPolicy: Always
