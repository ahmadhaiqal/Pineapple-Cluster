apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - urial-lab

      securityContext:
        fsGroup: 911

      initContainers:
        - name: init-dirs
          image: busybox:1.38.0
          command: ["sh", "-c", "mkdir -p /data/media/tv /data/torrents/sonarr"]
          volumeMounts:
            - name: data
              mountPath: /data

      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls313
          ports:
            - containerPort: 8989
              protocol: TCP

          env:
            # Must be 911 (not 1000): the shared media-pvc tree is owned by 911
            # (created by rdt-client). Mismatched UID -> imports into
            # /data/media/tv fail with UnauthorizedAccessException and never
            # reach Jellyfin. Keep PUID/PGID/fsGroup aligned at 911.
            - name: PUID
              value: "911"
            - name: PGID
              value: "911"
            - name: TZ
              value: "Asia/Kuala_Lumpur"

          securityContext:
            allowPrivilegeEscalation: false

          volumeMounts:
            - name: sonarr-config
              mountPath: /config
            - name: data
              mountPath: /data

      restartPolicy: Always

      volumes:
        - name: sonarr-config
          persistentVolumeClaim:
            claimName: sonarr-config-pvc
        - name: data
          persistentVolumeClaim:
            claimName: media-pvc
