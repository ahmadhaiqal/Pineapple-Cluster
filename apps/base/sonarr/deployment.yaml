apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - urial-lab

      securityContext:
        fsGroup: 1000

      initContainers:
        - name: init-dirs
          image: busybox:latest
          command: ["sh", "-c", "mkdir -p /data/media/tv /data/torrents/tv"]
          volumeMounts:
            - name: data
              mountPath: /data

      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:latest
          ports:
            - containerPort: 8989
              protocol: TCP

          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Asia/Kuala_Lumpur"

          securityContext:
            allowPrivilegeEscalation: false

          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    until [ -f /config/config.xml ] && \
                      KEY=$(sed -n 's|.*<ApiKey>\(.*\)</ApiKey>.*|\1|p' /config/config.xml) && \
                      curl -sf http://localhost:8989/api/v3/system/status \
                        -H "X-Api-Key: $KEY" > /dev/null 2>&1; do
                      sleep 5
                    done
                    curl -sf http://localhost:8989/api/v3/rootfolder \
                      -H "X-Api-Key: $KEY" | grep -q '/data/media/tv' || \
                    curl -sf -X POST http://localhost:8989/api/v3/rootfolder \
                      -H "X-Api-Key: $KEY" -H "Content-Type: application/json" \
                      -d '{"path":"/data/media/tv"}'

          volumeMounts:
            - name: sonarr-config
              mountPath: /config
            - name: data
              mountPath: /data

      restartPolicy: Always

      volumes:
        - name: sonarr-config
          persistentVolumeClaim:
            claimName: sonarr-config-pvc
        - name: data
          persistentVolumeClaim:
            claimName: media-pvc
