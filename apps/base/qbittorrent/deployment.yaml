apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
spec:
  replicas: 1
  # single replica sharing RWO config PVC — never run old and new pod together
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - urial-lab

      initContainers:
        - name: init-dirs
          image: busybox:1.38.0
          command:
            - sh
            - -c
            - |
              mkdir -p /data/torrents/movies /data/torrents/tv
              mkdir -p /config/qBittorrent
              if [ ! -f /config/qBittorrent/qBittorrent.conf ]; then
                printf '[Preferences]\nDownloads\\SavePath=/data/torrents/\nDownloads\\TempPath=/data/torrents/incomplete/\n' \
                  > /config/qBittorrent/qBittorrent.conf
              fi
          volumeMounts:
            - name: media
              mountPath: /data
            - name: qbittorrent-config
              mountPath: /config

      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.41.1
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
            allowPrivilegeEscalation: false
          env:
            - name: VPN_SERVICE_PROVIDER
              value: protonvpn
            - name: VPN_TYPE
              value: wireguard
            # allow WebUI traffic in from the cluster (sonarr/radarr/cloudflared);
            # gluetun's firewall drops all non-VPN inbound otherwise
            - name: FIREWALL_INPUT_PORTS
              value: "8080,8888"
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_PORT
              value: "8888"
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn-credentials
                  key: WIREGUARD_PRIVATE_KEY
            - name: WIREGUARD_ADDRESSES
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn-credentials
                  key: WIREGUARD_ADDRESSES

        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.2.1_v2.0.13-ls460
          ports:
            - containerPort: 8080
              protocol: TCP
            - containerPort: 6881
              protocol: TCP
            - containerPort: 6881
              protocol: UDP

          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: WEBUI_PORT
              value: "8080"

          securityContext:
            allowPrivilegeEscalation: false

          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: media
              mountPath: /data

      restartPolicy: Always

      volumes:
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
