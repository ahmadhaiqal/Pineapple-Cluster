apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdt-client
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rdt-client
  template:
    metadata:
      labels:
        app: rdt-client
    spec:
      # Real-Debrid's download CDN (*.download.real-debrid.com) is IPv6-only and
      # Cilium is single-stack v4, so a normal pod has no route to it. hostNetwork
      # lets rdt-client use the node's own (now IPv6-capable) network stack to reach
      # it. ClusterFirstWithHostNet keeps DNS pointed at CoreDNS. Namespace movietime
      # is labelled PodSecurity 'privileged', which hostNetwork requires.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - urial-lab

      containers:
        - name: rdt-client
          image: rogerfar/rdtclient:2.0.140
          ports:
            - containerPort: 6500
              protocol: TCP

          volumeMounts:
            - name: rdt-client-config
              mountPath: /data/db
            - name: media
              mountPath: /data

      restartPolicy: Always

      volumes:
        - name: rdt-client-config
          persistentVolumeClaim:
            claimName: rdt-client-config-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
