apiVersion: apps/v1
kind: Deployment
metadata:
  name: suwayomi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: suwayomi
  template:
    metadata:
      labels:
        app: suwayomi
    spec:
      securityContext:
        fsGroup: 1000 # www-data group ID
        runAsUser: 1000 # www-data group ID
        runAsGroup: 1000 # www-data group ID

      containers:
        - name: suwayomi
          image: ghcr.io/suwayomi/suwayomi-server:v2.2.2219
          ports:
            - containerPort: 4567

          envFrom:
            - configMapRef:
                name: suwayomi-configmap

          # JVM heap is capped via JAVA_TOOL_OPTIONS=-Xmx512m (configmap). This
          # limit is the hard backstop: 896Mi leaves headroom for JVM non-heap
          # (metaspace, threads, direct buffers, code cache) above the 512Mi heap.
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              memory: 896Mi

          securityContext:
            allowPrivilegeEscalation: false

          volumeMounts:
            - name: suwayomi-files
              mountPath: /home/suwayomi/.local/share/Tachidesk
            - name: suwayomi-downloads
              mountPath: /home/suwayomi/.local/share/Tachidesk/downloads
      volumes:
        - name: suwayomi-files
          persistentVolumeClaim:
            claimName: suwayomi-files-pvc
        - name: suwayomi-downloads
          persistentVolumeClaim:
            claimName: suwayomi-downloads-pvc
