apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prowlarr
  template:
    metadata:
      labels:
        app: prowlarr
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:2.3.5.5327
          ports:
            - containerPort: 9696
              protocol: TCP

          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Asia/Kuala_Lumpur"

          securityContext:
            allowPrivilegeEscalation: false

          volumeMounts:
            - name: prowlarr-config
              mountPath: /config

      restartPolicy: Always

      volumes:
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: prowlarr-config-pvc
