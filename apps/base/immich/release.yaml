apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  # immich-server can be slow to become ready (DB migrations, occasional OOM
  # restart), which exceeds Helm's 5m default and previously left the release
  # stuck in a terminal Stalled state. Give upgrades more time and let
  # helm-controller retry + rollback instead of giving up after one attempt.
  timeout: 15m
  chart:
    spec:
      chart: immich
      version: ">=0.9.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library

    controllers:
      main:
        containers:
          main:
            env:
              DB_HOSTNAME: immich-db-production-cnpg-v1-rw
              DB_DATABASE_NAME: immich
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-creds
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-creds
                    key: password

    valkey:
      enabled: true

    server:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - urial-lab
      # immich-server previously ran with no resources (BestEffort QoS), making
      # it the first pod the kernel OOM-kills under node memory pressure
      # (observed exitCode 137). A memory request moves it to Burstable QoS so
      # it is far less likely to be the OOM victim; the limit caps worst-case use.
      controllers:
        main:
          containers:
            main:
              resources:
                requests:
                  memory: 1Gi
                limits:
                  memory: 4Gi

    machine-learning:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - urial-lab
