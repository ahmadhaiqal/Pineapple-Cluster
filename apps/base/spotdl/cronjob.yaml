apiVersion: batch/v1
kind: CronJob
metadata:
  name: spotdl-sync
spec:
  schedule: "0 9 30 * *" # every day at 3am MYT
  timeZone: Asia/Kuala_Lumpur
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 10800 # kill after 3 hours (prevents pile-up when rate-limited)
      template:
        spec:
          # media-pvc is RWO Longhorn attached on urial-lab — every pod that
          # mounts it must land on the same node.
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          - urial-lab

          # Writes into the shared movietime media tree, so it must be 911
          # (see CLAUDE.md) — do not copy the 1000 from apps elsewhere.
          securityContext:
            runAsUser: 911
            runAsGroup: 911
            fsGroup: 911

          initContainers:
            - name: init-dirs
              image: busybox:1.38.0
              command: ["sh", "-c", "mkdir -p /data/media/music"]
              volumeMounts:
                - name: data
                  mountPath: /data

          containers:
            - name: spotdl
              # The v4.5.0 tag is broken (Alpine/musl image ships a glibc-linked
              # tls-client lib -> "libresolv.so.2 not found"); fixed post-release,
              # so pin nightly by digest. Move to the next stable tag when cut.
              image: spotdl/spotify-downloader:nightly@sha256:1f6a0f63b55f983746d21a2b65e7f52a0e92052ba042fdf6af7e34022f4f585d
              imagePullPolicy: IfNotPresent
              env:
                # UID 911 has no passwd entry in this image; spotdl needs a
                # writable $HOME for its cache.
                - name: HOME
                  value: /tmp
              # v4.5.0: no /app/.venv — the image entrypoint is `uv run ... spotdl`,
              # replicated here so the playlist loop still works. Default audio
              # provider (ytmusic via yt-dlp) replaces the dead `piped` fallback.
              #
              # `sync` (not `download`) mirrors each Spotify playlist: first run
              # downloads everything and records the track list in a .spotdl
              # save file; later runs re-fetch the playlist, download additions,
              # and DELETE local files for removed tracks. spotdl refuses
              # --save-file together with a .spotdl query, hence the if/else.
              #
              # Everything is relative to the music root (cd below) on purpose:
              # the same output template is written into the .m3u8, so entries
              # stay relative and resolve inside Navidrome too, which mounts
              # this dir at /music and auto-imports the .m3u8 files as
              # playlists (Spotify order preserved, updated on every scan).
              # Per-playlist folders keep sync deletions from clobbering a
              # song that another playlist still references.
              command:
                - /bin/sh
                - -c
                - |
                  cd /data/media/music
                  mkdir -p .spotdl
                  fail=0
                  while IFS= read -r url; do
                    [ -z "$url" ] && continue
                    id=$(basename "$url" | cut -d'?' -f1)
                    save=".spotdl/$id.spotdl"
                    if [ -f "$save" ]; then
                      set -- sync "$save"
                    else
                      set -- --save-file "$save" sync "$url"
                    fi
                    uv run --project /app --no-dev --frozen --no-sync spotdl \
                      --output "{list-name}/{artists} - {title}.{output-ext}" \
                      --m3u "{list}.m3u8" \
                      "$@" || { echo "sync failed for $url"; fail=1; }
                  done < /config/playlist.txt
                  exit $fail

              volumeMounts:
                - name: data
                  mountPath: /data
                - name: config
                  mountPath: /config
          restartPolicy: OnFailure
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: media-pvc
            - name: config
              configMap:
                name: spotdl-playlists
