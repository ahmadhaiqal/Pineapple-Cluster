apiVersion: batch/v1
kind: CronJob
metadata:
  name: spotdl-sync
  namespace: navidrome
spec:
  schedule: "0 3 * * *" # every day at 3am
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 10800 # kill after 3 hours (prevents pile-up when rate-limited)
      template:
        spec:
          containers:
            - name: spotdl
              image: spotdl/spotify-downloader:v4.4.3
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  while IFS= read -r line; do
                    [ -z "$line" ] && continue
                    /app/.venv/bin/spotdl --audio youtube piped --output /music download "$line"
                  done < /config/playlist.txt

              volumeMounts:
                - name: music
                  mountPath: /music
                - name: config
                  mountPath: /config
          restartPolicy: OnFailure
          volumes:
            - name: music
              persistentVolumeClaim:
                claimName: navidrome-music-pvc
            - name: config
              configMap:
                name: spotdl-playlists
