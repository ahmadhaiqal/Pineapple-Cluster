apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
spec:
  interval: 1h
  chart:
    spec:
      chart: metrics-server
      version: "3.13.1" # or latest
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: metrics-server
  valuesFrom:
    - kind: ConfigMap
      name: metrics-server-values
