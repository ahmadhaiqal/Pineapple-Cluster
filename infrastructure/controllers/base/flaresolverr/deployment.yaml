apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flaresolverr
  template:
    metadata:
      labels:
        app: flaresolverr
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000

      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 1.1.1.1
          - 8.8.8.8
        searches:
          - flaresolverr.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          # split A/AAAA into separate sockets — avoids the conntrack race
          # that drops one reply and causes intermittent ERR_NAME_NOT_RESOLVED
          - name: single-request-reopen
          # external hostnames have a dot — try them as-is, skip search-domain permutations
          - name: ndots
            value: "1"
          # short per-query timeout + more attempts so a dropped packet retries
          # well within Chrome's own DNS timeout instead of stalling 5s
          - name: timeout
            value: "2"
          - name: attempts
            value: "3"
          - name: rotate

      containers:
        - name: flaresolverr
          image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
          ports:
            - containerPort: 8191
              protocol: TCP

          envFrom:
            - configMapRef:
                name: flaresolverr-configmap
          securityContext:
            allowPrivilegeEscalation: false

      restartPolicy: Always
