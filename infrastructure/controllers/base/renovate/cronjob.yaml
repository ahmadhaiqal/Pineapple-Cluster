apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "@hourly"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: renovate
              image: renovate/renovate:43.246.1
              args:
                - ahmadhaiqal/Pineapple-Cluster

              envFrom:
                - secretRef:
                    name: renovate-container-env
                - configMapRef:
                    name: renovate-configmap

              # Unbounded (BestEffort) Renovate OOMed urial-lab on 2026-07-06:
              # Talos OOMController SIGKILLed neighbouring pods and Longhorn
              # volumes degraded. Keep the kill inside this container.
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  memory: 3Gi

          restartPolicy: Never
