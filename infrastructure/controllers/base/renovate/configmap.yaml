apiVersion: v1
kind: ConfigMap
metadata:
  name: renovate-configmap
  namespace: renovate
data:
  # Pods have no IPv6 egress (Cilium is single-stack v4) but CoreDNS returns
  # AAAA records first, so Node.js dials v6, times out on index.docker.io and
  # Renovate aborts the whole run with external-host-error.
  # network-family-autoselection-attempt-timeout: Node 24 (renovate >=43.246)
  # Happy Eyeballs aborts each connect attempt after 250ms, but the TCP
  # handshake to index.docker.io is ~300ms from MY — every attempt dies and
  # the run aborts with external-host-error (ETIMEDOUT). 1500ms lets the
  # transpacific handshake finish.
  # max-old-space-size keeps the V8 heap under the container's 3Gi limit so
  # Node GCs instead of getting OOM-killed.
  NODE_OPTIONS: "--dns-result-order=ipv4first --network-family-autoselection-attempt-timeout=1500 --max-old-space-size=2560"
  RENOVATE_AUTODISCOVER: "false"
  RENOVATE_GIT_AUTHOR: "Haiqal's Renovate Bot <bot@renovateapp.com>"
  RENOVATE_PLATFORM: "github"
