apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-db-production-cnpg-v1
spec:
  description: Postgres cluster for the immich application
  imageName: ghcr.io/immich-app/postgres:16-vectorchord0.3.0-pgvectors0.3.0
  instances: 1

  monitoring:
    enablePodMonitor: true

  inheritedMetadata:
    labels:
      app: immich-database
      policy-type: "database"

  storage:
    size: 5Gi

  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-db-creds

  resources:
    requests:
      memory: 600Mi
