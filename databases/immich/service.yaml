apiVersion: v1
kind: Service
metadata:
  name: immich-db-lb
  namespace: immich
  annotations:
    external-dns.alpha.kubernetes.io/hostname: immich-db.amdhql.org
  labels:
    cilium-lb-pool: pineapple-pool
spec:
  type: LoadBalancer
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    cnpg.io/cluster: immich-db-production-cnpg-v1
    role: primary
